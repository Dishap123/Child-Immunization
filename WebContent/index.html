<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Welcome</title>
<style>
    /* Reset some basic styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        padding: 0;
        margin: 0;
        background-image: url('https://www.worldatlas.com/r/w1200/upload/1d/33/a7/shutterstock-1419146978.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed; /* Keeps the image fixed on scroll */
        color: #fff;
        height: 100vh; /* Ensures the body takes up the full viewport height */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        text-align: center;
        background-color: rgba(0, 0, 0, 0.2);
        padding: 20px;
        border-radius: 10px;
    }

    h1 {
        margin-bottom: 20px;
        font-size: 2em;
    }

    a {
        display: block;
        text-align: center;
        margin: 10px auto;
        padding: 10px 20px;
        text-decoration: none;
        color: #fff;
        background-color: #007BFF;
        border-radius: 5px;
        transition: background-color 0.3s;
        width: 80%; /* Adjust width for smaller screens */
        max-width: 300px; /* Max width for larger screens */
    }

    a:hover {
        background-color: #0056b3;
    }

    /* Responsive design */
    @media (min-width: 600px) {
        a {
            width: 50%;
        }
    }

    @media (min-width: 768px) {
        a {
            width: 40%;
        }
    }

    @media (min-width: 992px) {
        a {
            width: 30%;
        }
    }

    @media (min-width: 1200px) {
        a {
            width: 20%;
        }
    }
</style>
</head>
<body>
<div class="container">
    <h1>Welcome To Child Vaccination Reminder</h1>
    <a href="hospital.html">Hospital</a>
    <a href="user.html">Child</a>
</div>
</body>
</html>
