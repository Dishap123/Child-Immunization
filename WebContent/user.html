<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: url('http://clf1.medpagetoday.com/media/images/49xxx/49717.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
  }

  form {
    background-color: rgba(0, 0, 0, 0.7);
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    text-align: center;
    width: 100%;
    max-width: 400px;
  }

  h1 {
    margin-bottom: 20px;
  }

  input[type="text"],
  input[type="submit"] {
    padding: 10px;
    margin: 10px 0;
    width: 100%;
    box-sizing: border-box;
    border: none;
    border-radius: 4px;
  }

  input[type="text"] {
    background-color: white;
    color: black;
  }

  input[type="submit"] {
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
  }

  input[type="submit"]:hover {
    background-color: #45a049;
  }

  a {
    color: #4CAF50;
    text-decoration: none;
    display: block;
    margin-top: 20px;
  }

  a:hover {
    text-decoration: underline;
  }

  /* Responsive layout */
  @media (max-width: 600px) {
    input[type="text"],
    input[type="submit"] {
      width: 90%;
    }
  }
</style>
</head>
<body>
<form action="LoginUser" method="post">
		<h1>Child Login</h1>
		<input type="text" name=cname placeholder="enter child name">
		<br>
		<input type="text" name=pcontact placeholder="enter parent contact">
		<br>
		<input type="submit" value="Submit">
		<br>
		<a href="index.html">Go Back</a>
	</form>
</body>
</html>
