<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
  }

  h1 {
    text-align: center;
    margin-top: 20px;
  }

  form {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 20px;
  }

  input[type="text"],
  input[type="date"],
  input[type="submit"] {
    padding: 10px;
    margin: 10px;
    width: 100%;
    max-width: 300px;
  }

  input[type="submit"] {
    background-color: #4CAF50;
    color: white;
    border: none;
    cursor: pointer;
  }

  input[type="submit"]:hover {
    background-color: #45a049;
  }

  a {
    display: block;
    text-align: center;
    margin: 20px;
    text-decoration: none;
    color: #4CAF50;
  }

  /* Responsive layout */
  @media (max-width: 600px) {
    input[type="text"],
    input[type="date"],
    input[type="submit"] {
      width: 90%;
    }
  }
</style>

</head>
<body>
<h1> Add User </h1>
		<form action="RegisterUser" method="post">
				<input type ="text" name="cname" placeholder=" enter  child name ">
				<br>
				<input type ="text" name="pname" placeholder=" enter parents Name ">
				<br>		
				<input type ="date" name="cdob" placeholder=" Child Date Of Birth ">
				<br>		
				<input type="text" name="pcontact" placeholder=" enter parent contact">
				<br>	
				<input type="text" name="address" placeholder=" enter address">
				<br>
				<input type="submit" value="submit">
		</form>
		<br>
		<a href="Dashboard.html">Go Back</a>


</body>
</html>
